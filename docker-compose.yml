version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: cosvir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cosvir
    ports:
      - "5432:5432"
    volumes:
      - cosvir_pg:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: cosvir-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cosvir
      JWT_SECRET: super_secret_replace
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_TTL_DAYS: 14
      CORS_ORIGIN: http://localhost:8080
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      EXPORT_DIR: /app/exports
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: cosvir-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  cosvir_pg:
